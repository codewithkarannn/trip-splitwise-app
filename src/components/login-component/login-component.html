<div class="min-h-screen bg-base-200 flex items-center justify-center px-4">
  <div class="card bg-base-100 shadow-xl w-full max-w-sm">
    <div class="card-body items-center text-center gap-6 p-10">

      <!-- Icon -->
      <div class="w-16 h-16 rounded-2xl bg-primary/10 flex items-center justify-center">
        <lucide-icon [img]="Plane" class="w-8 h-8 text-primary"></lucide-icon>
      </div>

      <!-- Title -->
      <div class="space-y-1">
        <h1 class="text-2xl font-bold tracking-tight">Trip Splitwise</h1>
        <p class="text-sm opacity-60">Split expenses with your travel buddies</p>
      </div>

      <!-- Google Button -->
      <button
        (click)="login()"
        class="btn btn-outline w-full gap-3 normal-case"
      >
        <!-- Google SVG Icon -->
        <svg class="w-5 h-5" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 9.5c3.14 0 5.95 1.08 8.17 2.86l6.08-6.08C34.46 3.39 29.5 1.5 24 1.5 14.82 1.5 7.01 7.1 3.64 15.02l7.08 5.5C12.4 14.48 17.73 9.5 24 9.5z"
                fill="#EA4335"/>
          <path d="M46.1 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.42c-.54 2.9-2.18 5.36-4.64 7.01l7.19 5.58C43.18 37.3 46.1 31.36 46.1 24.5z"
                fill="#4285F4"/>
          <path d="M10.72 28.52A14.6 14.6 0 0 1 9.5 24c0-1.57.27-3.09.72-4.52l-7.08-5.5A22.47 22.47 0 0 0 1.5 24c0 3.61.87 7.02 2.64 10.02l6.58-5.5z"
                fill="#FBBC05"/>
          <path d="M24 46.5c5.5 0 10.12-1.82 13.5-4.96l-7.19-5.58c-1.82 1.22-4.15 1.94-6.31 1.94-6.27 0-11.6-4.98-13.28-11.38l-6.58 5.5C7.01 40.9 14.82 46.5 24 46.5z"
                fill="#34A853"/>
        </svg>
        Continue with Google
      </button>

      <p class="text-xs opacity-40">
        By continuing, you agree to our Terms of Service
      </p>

    </div>
  </div>
</div>
