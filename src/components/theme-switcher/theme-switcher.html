<div class="dropdown dropdown-end">

  <button class="btn btn-ghost btn-sm gap-2" tabindex="0">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path
        d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"
        stroke-linecap="round" stroke-linejoin="round"
        stroke-width="2"/>
    </svg>
    <span class="hidden sm:inline text-xs capitalize">Theme</span>
  </button>

  <div class="dropdown-content bg-base-100 border border-base-200
               rounded-box shadow-xl p-2 w-52 max-h-80 overflow-y-auto z-50 mt-1"
       tabindex="0">

    @for (theme of themes; track theme) {
      <label
        [attr.data-theme]="theme"
        class="flex items-center gap-3 px-3 py-2 mt-2 rounded-lg
                   hover:bg-base-200 cursor-pointer transition"
      >

        <input
          (change)="saveTheme(theme)"
          [checked]="theme === savedTheme"
          [value]="theme"
          class="theme-controller hidden"
          name="theme-radios"
          type="radio"
        />

        <!-- Color preview dots -->
        <span class="flex gap-0.5">
              <span class="w-2 h-2 rounded-full bg-primary"></span>
              <span class="w-2 h-2 rounded-full bg-secondary"></span>
              <span class="w-2 h-2 rounded-full bg-accent"></span>
            </span>

        <span class="text-xs font-medium capitalize flex-1">{{ theme }}</span>

      </label>
    }

  </div>
</div>
